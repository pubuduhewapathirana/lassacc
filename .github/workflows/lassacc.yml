name: Supabase heartbeat

on:
  schedule:
    - cron: "*/5 * * * *"   # Every 5 minutes (UTC)
  workflow_dispatch:         # Allow manual test from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Call /rest/v1/rpc/heartbeat
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -e
          STATUS=$(curl -s -o /tmp/out.json -w "%{http_code}" \
            -X POST "$SUPABASE_URL/rest/v1/rpc/heartbeat" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d "{}")
          echo "HTTP status: $STATUS"
          cat /tmp/out.json || true
          case "$STATUS" in 2*) exit 0 ;; *) echo "Heartbeat failed"; exit 1 ;; esac
